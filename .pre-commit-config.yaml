# Pre-commit hooks for pyMediaManager
# See https://pre-commit.com for more information
# Run: pre-commit install
# Test: pre-commit run --all-files

repos:
  # Ruff - fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        name: Ruff Linter (auto-fix)
      # Run the formatter
      - id: ruff-format
        name: Ruff Formatter

  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
      - id: end-of-file-fixer
        name: Fix End of Files
      - id: check-yaml
        name: Check YAML Syntax
      - id: check-added-large-files
        args: ['--maxkb=1000']
        name: Check for Large Files (>1MB)
      - id: check-merge-conflict
        name: Check for Merge Conflicts
      - id: check-toml
        name: Check TOML Syntax
      - id: mixed-line-ending
        args: ['--fix=lf']
        name: Fix Mixed Line Endings
      - id: check-json
        name: Check JSON Syntax
      - id: check-case-conflict
        name: Check Filename Case Conflicts
      - id: detect-private-key
        name: Detect Private Keys
      - id: check-ast
        name: Check Python AST
      - id: check-builtin-literals
        name: Check Builtin Type Constructor Use
      - id: check-docstring-first
        name: Check Docstring First
      - id: debug-statements
        name: Check for Debugger Imports
      - id: name-tests-test
        name: Check Test Naming
        args: ['--pytest-test-first']

  # Security checks
  - repo: https://github.com/PyCQA/bandit
    rev: '1.7.9'
    hooks:
      - id: bandit
        name: Bandit Security Linter
        args: ['-c', 'pyproject.toml']
        additional_dependencies: ['bandit[toml]']
        exclude: ^tests/

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.42.0
    hooks:
      - id: markdownlint
        name: Markdown Linter
        args: [--fix, --disable, MD013, MD024, MD033, MD041]

  # Python type checking with mypy (local environment)
  - repo: local
    hooks:
      - id: mypy
        name: MyPy Type Checker
        entry: just type-check
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

  # Note: Safety check removed as it only supports Poetry projects

  # Run pytest before commit (fast tests only)
  - repo: local
    hooks:
      - id: pytest-check
        name: PyTest - Unit Tests (Fast)
        entry: just test-unit
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: pytest-full
        name: PyTest - All Tests (Pre-Push)
        entry: just test
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: docs-check
        name: Documentation Validation
        entry: python
        language: system
        pass_filenames: false
        always_run: true
        args:
          - -c
          - |
            import re
            import sys
            from pathlib import Path

            # Check for TODO/FIXME in docs
            docs_path = Path('docs')
            readme = Path('README.md')

            issues = []
            for doc in [readme] + list(docs_path.glob('*.md')):
                content = doc.read_text(encoding='utf-8')
                if 'TODO' in content or 'FIXME' in content:
                    issues.append(f"{doc}: Contains TODO/FIXME")

            if issues:
                print("⚠️  Documentation issues found:")
                for issue in issues:
                    print(f"  - {issue}")
                print("\n✅ Note: This is a warning, not blocking commit")
            else:
                print("✅ Documentation validation passed")
        stages: [pre-push]

# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [pytest-check, pytest-full, docs-check]
  submodules: false
