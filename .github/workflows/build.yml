name: Build Portable Distribution

on:
  workflow_dispatch:
  workflow_call:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-windows:
    name: Build for Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python for build script
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools-scm

      - name: Get version
        id: version
        run: |
          $version = python -m setuptools_scm
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Generate _version.py
        run: |
          python -m setuptools_scm

      - name: Run Build Script
        run: |
          python scripts/build_distribution.py --version ${{ matrix.python-version }}

      - name: Freeze dependencies
        run: |
          $pyNoDot = "${{ matrix.python-version }}".Replace(".", "")
          $pythonDir = "python$pyNoDot"
          $reqFile = "requirements-frozen-py${pyNoDot}.txt"

          & "./$pythonDir/python.exe" -m pip freeze > $reqFile
          echo "REQUIREMENTS_FILE=$reqFile" >> $env:GITHUB_OUTPUT

      - name: Create portable archive
        run: |
          $pyNoDot = "${{ matrix.python-version }}".Replace(".", "")
          $pythonDir = "python$pyNoDot"
          $libDir = "lib-py$pyNoDot"
          $archiveName = "pyMM-v${{ steps.version.outputs.VERSION }}-py${{ matrix.python-version }}-win64.zip"
          $reqFile = "requirements-frozen-py${pyNoDot}.txt"

          Compress-Archive -Path `
            $pythonDir, `
            $libDir, `
            app, `
            plugins, `
            config, `
            launcher.py, `
            README.md, `
            LICENSE, `
            $reqFile `
            -DestinationPath $archiveName

          echo "ARCHIVE_NAME=$archiveName" >> $env:GITHUB_OUTPUT

      - name: Calculate SHA256 checksum
        run: |
          $archiveName = "pyMM-v${{ steps.version.outputs.VERSION }}-py${{ matrix.python-version }}-win64.zip"
          $hash = (Get-FileHash -Path $archiveName -Algorithm SHA256).Hash
          $hash | Out-File -FilePath "${archiveName}.sha256" -NoNewline
          echo "CHECKSUM=$hash" >> $env:GITHUB_OUTPUT
          echo "Checksum: $hash"

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: pyMM-py${{ matrix.python-version }}-build
          path: |
            pyMM-v*.zip
            pyMM-v*.sha256
          retention-days: 30

  create-recommended-link:
    name: Create recommended release link
    runs-on: ubuntu-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Create recommended symlink metadata
        run: |
          echo "pyMM-py3.13-build" > RECOMMENDED.txt
          echo "For most users, download the Python 3.13 build for best compatibility." >> RECOMMENDED.txt

      - name: Upload recommended metadata
        uses: actions/upload-artifact@v6
        with:
          name: recommended-metadata
          path: RECOMMENDED.txt
