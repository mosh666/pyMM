name: CI - Tests and Linting

on:
  push:
    branches: [ main, dev ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  checks: write
  statuses: write

jobs:
  lint:
    name: Linting and Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Just
        uses: extractions/setup-just@v2

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: just install

      - name: Run ruff linting
        run: just lint

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Just
        uses: extractions/setup-just@v2

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: just install

      - name: Run mypy type checking
        run: just lint

  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [lint, type-check]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]
        include:
          # Test Python 3.14 (Preview) only on Windows for now
          - os: windows-latest
            python-version: "3.14"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for setuptools-scm

      - name: Set up Just
        uses: extractions/setup-just@v2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: just install

      - name: Run pytest with coverage (strict)
        run: |
          echo "🧪 Running all tests with coverage..."
          pytest tests/ --cov=app --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-py${{ matrix.python-version }}
        continue-on-error: true

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report-${{ matrix.os }}-py${{ matrix.python-version }}
          path: htmlcov/
        if: always()

  lint-docs:
    name: Documentation Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Lint markdown files (strict)
        uses: DavidAnson/markdownlint-cli2-action@v22
        with:
          globs: '**/*.md'
          config: '.markdownlint.json'

      - name: Check for broken links
        run: |
          echo "🔗 Checking for broken internal links..."
          # Check if README links to existing files
          if ! grep -q "docs/user-guide.md" README.md; then
            echo "⚠️  Warning: README might have broken documentation links"
          fi
          echo "✅ Basic link check passed"

      - name: Check documentation completeness
        run: |
          echo "📚 Checking documentation completeness..."
          required_docs=("README.md" "CHANGELOG.md" "CONTRIBUTING.md" "LICENSE" "docs/user-guide.md" "docs/architecture.md")
          missing_docs=()

          for doc in "${required_docs[@]}"; do
            if [ ! -f "$doc" ]; then
              missing_docs+=("$doc")
            fi
          done

          if [ ${#missing_docs[@]} -gt 0 ]; then
            echo "❌ Missing required documentation files:"
            printf '  - %s\n' "${missing_docs[@]}"
            exit 1
          fi

          echo "✅ All required documentation files present"

  validate-config:
    name: Configuration Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Validate YAML files
        run: |
          echo "📝 Validating YAML configuration files..."
          pip install pyyaml
          python <<'PYEOF'
          import yaml
          import sys
          from pathlib import Path

          errors = []
          for yaml_file in Path('.').rglob('*.yaml'):
              if '.github' in str(yaml_file) or 'node_modules' in str(yaml_file):
                  continue
              try:
                  with open(yaml_file) as f:
                      yaml.safe_load(f)
                  print(f'✅ {yaml_file}')
              except Exception as e:
                  errors.append(f'{yaml_file}: {e}')
                  print(f'❌ {yaml_file}: {e}')

          if errors:
              sys.exit(1)
          print('\n✅ All YAML files validated')
          PYEOF

      - name: Validate pyproject.toml
        run: |
          echo "📦 Validating pyproject.toml..."
          pip install tomli
          python -c "import tomli; tomli.load(open('pyproject.toml', 'rb'))"
          echo "✅ pyproject.toml is valid"

  test-docker:
    name: Docker Container Tests
    runs-on: ubuntu-latest
    needs: [lint, type-check]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for setuptools-scm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          echo "🐳 Building Docker image..."
          docker build -t pymm-ci:${{ github.sha }} .
          echo "✅ Docker image built successfully"

      - name: Run tests in Docker container
        run: |
          echo "🧪 Running tests in Docker container..."
          docker run --rm \
            -e PYMM_DISABLE_TEMPLATE_WATCH=1 \
            pymm-ci:${{ github.sha }}
          echo "✅ Docker tests passed"

      - name: Verify application startup
        run: |
          echo "🚀 Verifying application can start in container..."
          docker run --rm \
            -e PYMM_DISABLE_TEMPLATE_WATCH=1 \
            --entrypoint python \
            pymm-ci:${{ github.sha }} \
            -c "from app.main import get_app_root; print(f'App root: {get_app_root()}')"
          echo "✅ Application startup verified"

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, lint-docs, validate-config, test-docker]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "📊 CI Pipeline Summary:"
          echo "  Linting: ${{ needs.lint.result }}"
          echo "  Type Checking: ${{ needs.type-check.result }}"
          echo "  Tests: ${{ needs.test.result }}"
          echo "  Documentation: ${{ needs.lint-docs.result }}"
          echo "  Configuration: ${{ needs.validate-config.result }}"
          echo "  Docker Tests: ${{ needs.test-docker.result }}"

          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.type-check.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.lint-docs.result }}" != "success" ]] || \
             [[ "${{ needs.validate-config.result }}" != "success" ]] || \
             [[ "${{ needs.test-docker.result }}" != "success" ]]; then
            echo "❌ CI pipeline failed - please fix errors before merging"
            exit 1
          fi

          echo "✅ All CI checks passed!"
