name: Documentation

on:
  push:
    branches: ["**"]
    paths:
      - 'docs/**'
      - 'app/**/*.py'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: ["**"]
    paths:
      - 'docs/**'
      - 'app/**/*.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install sphinx-multiversion

      - name: Build Sphinx documentation
        run: |
          git config --global core.longpaths true
          sphinx-multiversion docs docs/_build/html -v
          New-Item -ItemType Directory -Force -Path docs/_build/html | Out-Null
          New-Item -ItemType File -Force -Path docs/_build/html/index.html | Out-Null
          Set-Content -Path docs/_build/html/index.html -Value '<meta http-equiv="refresh" content="0; url=main/index.html">'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
