name: Documentation

on:
  push:
    branches: ["**"]
    paths:
      - 'docs/**'
      - 'app/**/*.py'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: ["**"]
    paths:
      - 'docs/**'
      - 'app/**/*.py'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      PYTHONUTF8: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install sphinx-multiversion

      - name: Build Sphinx documentation
        run: |
          git config --global core.longpaths true
          sphinx-multiversion docs docs/_build/html -v
          New-Item -ItemType Directory -Force -Path docs/_build/html | Out-Null
          New-Item -ItemType File -Force -Path docs/_build/html/index.html | Out-Null
          @"
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <title>pyMediaManager Documentation</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 100px auto; padding: 20px; text-align: center; }
                  h1 { color: #333; }
                  .version-links { margin-top: 40px; }
                  .version-link { display: inline-block; margin: 10px 20px; padding: 15px 40px; background: #0366d6; color: white; text-decoration: none; border-radius: 6px; font-size: 18px; }
                  .version-link:hover { background: #0256c4; }
                  .version-link.stable { background: #28a745; }
                  .version-link.stable:hover { background: #218838; }
              </style>
          </head>
          <body>
              <h1>pyMediaManager Documentation</h1>
              <p>Choose a version to view:</p>
              <div class="version-links">
                  <a href="main/index.html" class="version-link stable">📘 Main (Stable)</a>
                  <a href="dev/index.html" class="version-link">🚧 Dev (Latest)</a>
              </div>
          </body>
          </html>
          "@ | Set-Content -Path docs/_build/html/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
