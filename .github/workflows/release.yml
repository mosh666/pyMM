name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.0.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml
  
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -name "*.zip" -exec cp {} release-assets/ \;
          find artifacts/ -name "*.sha256" -exec cp {} release-assets/ \;
          ls -lah release-assets/
      
      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          
          # Extract changelog section for this version (if CHANGELOG.md exists)
          if [ -f CHANGELOG.md ]; then
            sed -n "/## \[$TAG_NAME\]/,/## \[/p" CHANGELOG.md | sed '$d' > release-notes.md
          else
            echo "Release $TAG_NAME" > release-notes.md
            echo "" >> release-notes.md
            echo "See commit history for changes." >> release-notes.md
          fi
          
          # Add download instructions
          cat >> release-notes.md << 'EOF'
          
          ## Download Instructions
          
          ### Recommended (Python 3.13)
          Download `pyMM-${TAG_NAME}-py3.13-win64.zip` for the latest Python version with best compatibility.
          
          ### Python 3.12
          Download `pyMM-${TAG_NAME}-py3.12-win64.zip` if you need Python 3.12 specifically.
          
          ### Verification
          Verify your download using the SHA256 checksums:
          ```bash
          # PowerShell
          (Get-FileHash -Path pyMM-*.zip -Algorithm SHA256).Hash -eq (Get-Content pyMM-*.sha256)
          ```
          
          ### Installation
          1. Extract ZIP to your portable drive (e.g., `D:\pyMM\`)
          2. Run: `D:\pyMM\python313\python.exe D:\pyMM\launcher.py`
          3. Complete first-run setup wizard
          
          See [README.md](https://github.com/mosh666/pyMM/blob/main/README.md) for detailed instructions.
          EOF
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Update latest release symlink comment
        run: |
          echo "✅ Release ${{ steps.changelog.outputs.TAG_NAME }} published successfully"
          echo "📦 Recommended download: pyMM-${{ steps.changelog.outputs.TAG_NAME }}-py3.13-win64.zip"
