name: Release

on:
  push:
    branches: [ dev ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v0.0.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -name "*.zip" -exec cp {} release-assets/ \;
          find artifacts/ -name "*.sha256" -exec cp {} release-assets/ \;
          ls -lah release-assets/

      - name: Clean existing assets from latest-beta release
        if: github.ref == 'refs/heads/dev'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get the latest-beta release ID
          RELEASE_ID=$(gh release view latest-beta --json id --jq '.id' 2>/dev/null || echo "")

          if [ -n "$RELEASE_ID" ]; then
            echo "Found existing latest-beta release (ID: $RELEASE_ID)"

            # List and delete all assets from the release
            gh release view latest-beta --json assets --jq '.assets[].name' | while read -r asset_name; do
              if [ -n "$asset_name" ]; then
                echo "Deleting asset: $asset_name"
                gh release delete-asset latest-beta "$asset_name" --yes || echo "Failed to delete $asset_name"
              fi
            done

            echo "✅ All existing assets cleaned from latest-beta release"
          else
            echo "ℹ️  No existing latest-beta release found (will be created)"
          fi

      - name: Update latest-beta tag to trigger source archive regeneration
        if: github.ref == 'refs/heads/dev'
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete remote tag if it exists (this will also delete the release)
          if git ls-remote --tags origin | grep -q "refs/tags/latest-beta"; then
            echo "Deleting existing latest-beta tag from remote..."
            git push origin :refs/tags/latest-beta || echo "Tag already deleted"

            # Delete release (if still exists after tag deletion)
            gh release delete latest-beta --yes 2>/dev/null || echo "Release already deleted"
          fi

          # Create new tag at current commit
          echo "Creating new latest-beta tag at current commit..."
          git tag -f latest-beta
          git push origin latest-beta

          echo "✅ Tag updated - GitHub will regenerate source archives"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Release Tag & Changelog
        id: changelog
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            IS_PRERELEASE=false
            if [[ "$TAG_NAME" == *"-alpha"* ]] || [[ "$TAG_NAME" == *"-beta"* ]] || [[ "$TAG_NAME" == *"-rc"* ]]; then
              IS_PRERELEASE=true
            fi
          elif [[ $GITHUB_REF == refs/heads/dev ]]; then
            TAG_NAME="latest-beta"
            IS_PRERELEASE=true
          else
            TAG_NAME="unknown"
            IS_PRERELEASE=true
          fi

          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_OUTPUT

          # Extract changelog section for this version (if CHANGELOG.md exists)
          if [ -f CHANGELOG.md ] && [[ $GITHUB_REF == refs/tags/* ]]; then
            sed -n "/## \[$TAG_NAME\]/,/## \[/p" CHANGELOG.md | sed '$d' > release-notes.md
          elif [[ $GITHUB_REF == refs/heads/dev ]]; then
            # For latest-beta, generate release notes from recent commits
            echo "# Latest Beta Release" > release-notes.md
            echo "" >> release-notes.md
            echo "**⚠️ Beta Build** - This is an automated rolling release from the \`dev\` branch." >> release-notes.md
            echo "" >> release-notes.md
            echo "**Build Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> release-notes.md
            echo "**Commit:** \`${GITHUB_SHA:0:7}\`" >> release-notes.md
            echo "" >> release-notes.md
            echo "## Recent Changes" >> release-notes.md
            echo "" >> release-notes.md

            # Get recent commits (last 10)
            git log --pretty=format:"- %s (\`%h\`)" -n 10 >> release-notes.md

            echo "" >> release-notes.md
            echo "" >> release-notes.md
            echo "---" >> release-notes.md
            echo "" >> release-notes.md
            echo "**Note:** Beta builds are updated automatically with each push to the dev branch. For stable releases, see tagged versions." >> release-notes.md
          else
            echo "Release $TAG_NAME" > release-notes.md
            echo "" >> release-notes.md
            echo "Automated release from $GITHUB_REF" >> release-notes.md
            echo "See commit history for changes." >> release-notes.md
          fi

          # Add download instructions
          cat >> release-notes.md << EOF

          ## Download Instructions

          ### Recommended (Python 3.13)
          Download \`pyMM-*-py3.13-win64.zip\` for the latest Python version with best compatibility.

          ### Python 3.12
          Download \`pyMM-*-py3.12-win64.zip\` if you need Python 3.12 specifically.

          ### Verification
          Verify your download using the SHA256 checksums:
          \`\`\`bash
          # PowerShell
          (Get-FileHash -Path pyMM-*.zip -Algorithm SHA256).Hash -eq (Get-Content pyMM-*.sha256)
          \`\`\`

          ### Installation
          1. Extract ZIP to your portable drive (e.g., \`D:\pyMM\\\`)
          2. Run: \`D:\pyMM\python313\python.exe D:\pyMM\launcher.py\`
          3. Complete first-run setup wizard

          See [README.md](https://github.com/mosh666/pyMM/blob/main/README.md) for detailed instructions.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changelog.outputs.TAG_NAME }}
          files: release-assets/*
          body_path: release-notes.md
          draft: false
          prerelease: ${{ steps.changelog.outputs.IS_PRERELEASE }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest release symlink comment
        run: |
          echo "✅ Release ${{ steps.changelog.outputs.TAG_NAME }} published successfully"
